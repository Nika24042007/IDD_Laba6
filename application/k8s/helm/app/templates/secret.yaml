apiVersion: v1
kind: Secret
metadata:
  name: wishlist-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  database_url: {{ printf "postgresql://%s:%s@%s:%d/%s" 
    .Values.database.user 
    .Values.database.password 
    .Values.database.host 
    .Values.database.port 
    .Values.database.name 
  }}